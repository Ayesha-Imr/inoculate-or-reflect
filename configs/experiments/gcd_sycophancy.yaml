seed: 42

model_config_file: configs/models/qwen3-8b.yaml

concepts:
  - name: sycophancy
    config_file: configs/concepts/sycophancy.yaml
    best_layer: 18
  - name: honesty
    config_file: configs/concepts/honesty.yaml
    best_layer: 18

monitor:
  measure_every_n_steps: 25
  include_cross_concept_cosines: true
  output_csv: drift_log.csv

dataset:
  name: gcd_sycophancy
  subset_size: 2000
  max_seq_length: 1024

qlora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  learning_rate: 0.0001
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  fp16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_strategy: "epoch"
  report_to: "wandb"
  optim: paged_adamw_8bit
