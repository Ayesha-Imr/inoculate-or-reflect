seed: 42

model_config_file: configs/models/qwen3-8b.yaml

concepts:
  - name: sycophancy
    config_file: configs/concepts/sycophancy.yaml
    best_layer: 18
  - name: honesty
    config_file: configs/concepts/honesty.yaml
    best_layer: 18

monitor:
  measure_every_n_steps: 1
  include_cross_concept_cosines: true
  output_csv: drift_log.csv

dataset:
  name: tatsu-lab/alpaca
  subset_size: 32
  max_seq_length: 512

qlora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  max_steps: 2
  learning_rate: 0.0001
  warmup_ratio: 0.03
  fp16: true
  gradient_checkpointing: true
  logging_steps: 1
  save_strategy: "no"
  report_to: "none"
